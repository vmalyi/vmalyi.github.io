site_name: Viktor Malyi - Practical AI Leadership
site_url: https://vmalyi.com
site_description: "Fractional Head of AI for DACH companies. 8 years in machine learning, 5 production AI systems, 3 years leading AI platform teams. I help companies that invested in AI but have no one owning the outcome. Strategy, architecture, team enablement, governance."
site_author: Viktor Malyi

theme:
  name: shadcn
  show_title: true
  icon: null
  custom_dir: overrides

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/posthog.js

plugins:
  - search:
      indexing: 'full'
      lang: en
      min_search_length: 2
  - rss:
      match_path: "blog/*"
      date_from_meta:
        as_creation: date.created
        as_update: date.updated
      categories:
        - tags
      feed_ttl: 1440
      length: 1000
      pretty_print: true
      feed_description: "Practical AI implementation insights from Viktor Malyi"

nav:
  - Start: index.md
  - Consulting: consulting.md
  - Blog: blog/index.md
  - Speaking: speaking/index.md
  - About: about.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs/snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: false